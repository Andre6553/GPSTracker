<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ESP32 Tracker">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- App chrome: dark slate rounded tile -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- Outer fix / orbit ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.95"/>
  <!-- Inner pulse rings (subtle) -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#10b981" stroke-width="0.75" opacity="0.35"/>
  <!-- Target / current position -->
  <circle cx="16" cy="16" r="3.25" fill="#ecfdf5"/>
  <circle cx="16" cy="16" r="1.5" fill="#059669"/>
</svg>
